name: microservice-cluster

agents:
  - id: api-gateway
    role: coordinator
    trust_threshold: 0.6
  - id: auth-service
    role: validator
    trust_threshold: 0.8
  - id: user-service
    role: worker
    trust_threshold: 0.4
  - id: payment-service
    role: worker
    trust_threshold: 0.5
  - id: notification-service
    role: worker
    trust_threshold: 0.3
  - id: logging-service
    role: monitor
    trust_threshold: 0.7

connections:
  - from: api-gateway
    to: auth-service
  - from: api-gateway
    to: user-service
  - from: api-gateway
    to: payment-service
  - from: user-service
    to: notification-service
  - from: payment-service
    to: notification-service
  - from: logging-service
    to: api-gateway
  - from: logging-service
    to: auth-service
